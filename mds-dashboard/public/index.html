<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDS Dashboard — Server Monitor</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@300;400;600;700&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0e17;
      --surface: #111827;
      --surface-hover: #1a2332;
      --border: #1e293b;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --accent: #22d3ee;
      --accent-glow: rgba(34, 211, 238, 0.15);
      --green: #10b981;
      --orange: #f59e0b;
      --red: #ef4444;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(34, 211, 238, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34, 211, 238, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 48px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #6366f1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: var(--bg);
      font-family: 'JetBrains Mono', monospace;
    }

    .logo h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .logo h1 span {
      color: var(--accent);
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 13px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
      50% { opacity: 0.8; box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
    }

    /* Cards grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover {
      border-color: rgba(34, 211, 238, 0.3);
      transform: translateY(-2px);
    }

    .card:hover::before { opacity: 1; }

    .card-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-weight: 500;
    }

    .card-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .card-unit {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-muted);
      margin-left: 4px;
    }

    .card-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Memory bar */
    .mem-bar-track {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      margin-top: 16px;
      overflow: hidden;
    }

    .mem-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--green), var(--accent));
      transition: width 1s ease;
    }

    /* Wide card */
    .card-wide {
      grid-column: 1 / -1;
    }

    /* Log terminal */
    .terminal {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .terminal-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .terminal-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .terminal-dot:nth-child(1) { background: var(--red); }
    .terminal-dot:nth-child(2) { background: var(--orange); }
    .terminal-dot:nth-child(3) { background: var(--green); }

    .terminal-title {
      margin-left: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
    }

    .terminal-body {
      padding: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.8;
      max-height: 260px;
      overflow-y: auto;
    }

    .log-line {
      display: flex;
      gap: 12px;
      animation: fadeIn 0.4s ease;
    }

    .log-time { color: var(--text-muted); white-space: nowrap; }
    .log-tag {
      padding: 1px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }
    .log-tag.info { background: rgba(34, 211, 238, 0.15); color: var(--accent); }
    .log-tag.ok { background: rgba(16, 185, 129, 0.15); color: var(--green); }
    .log-tag.warn { background: rgba(245, 158, 11, 0.15); color: var(--orange); }
    .log-msg { color: var(--text); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Deploy info */
    .deploy-info {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      margin-top: 32px;
      padding: 20px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .deploy-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .deploy-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    .deploy-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--accent);
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-muted);
    }

    footer a { color: var(--accent); text-decoration: none; }

    /* Responsive */
    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr 1fr; }
      .card-value { font-size: 22px; }
      header { flex-direction: column; gap: 16px; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="logo">
        <div class="logo-icon">M</div>
        <h1>MDS <span>Dashboard</span></h1>
      </div>
      <div class="status-badge">
        <div class="status-dot"></div>
        <span id="status-text">Connecting...</span>
      </div>
    </header>

    <div class="grid">
      <div class="card">
        <div class="card-label">Hostname</div>
        <div class="card-value" id="hostname">—</div>
        <div class="card-sub" id="platform">—</div>
      </div>

      <div class="card">
        <div class="card-label">Uptime</div>
        <div class="card-value" id="uptime">—</div>
        <div class="card-sub">since last boot</div>
      </div>

      <div class="card">
        <div class="card-label">CPU Cores</div>
        <div class="card-value" id="cpus">—</div>
        <div class="card-sub" id="node-version">—</div>
      </div>

      <div class="card">
        <div class="card-label">Memory</div>
        <div class="card-value"><span id="mem-used">—</span><span class="card-unit">MB</span></div>
        <div class="card-sub" id="mem-detail">—</div>
        <div class="mem-bar-track">
          <div class="mem-bar-fill" id="mem-bar" style="width: 0%"></div>
        </div>
      </div>
    </div>

    <div class="terminal">
      <div class="terminal-header">
        <div class="terminal-dot"></div>
        <div class="terminal-dot"></div>
        <div class="terminal-dot"></div>
        <span class="terminal-title">system.log — live</span>
      </div>
      <div class="terminal-body" id="logs"></div>
    </div>

    <div class="deploy-info">
      <div class="deploy-item">
        <span class="deploy-label">Deployed by</span>
        <span class="deploy-value">BTS SIO Student</span>
      </div>
      <div class="deploy-item">
        <span class="deploy-label">Method</span>
        <span class="deploy-value">SSH + Git + Systemd</span>
      </div>
      <div class="deploy-item">
        <span class="deploy-label">Domain</span>
        <span class="deploy-value">projetmds.fr</span>
      </div>
      <div class="deploy-item">
        <span class="deploy-label">Stack</span>
        <span class="deploy-value">Node.js + Express</span>
      </div>
    </div>

    <footer>
      Projet BTS SIO — Learni Group &mdash; <a href="https://github.com">GitHub Repository</a>
    </footer>

  </div>

  <script>
    const $ = id => document.getElementById(id);

    function formatUptime(seconds) {
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      if (h > 0) return `${h}h ${m}m`;
      return `${m}m`;
    }

    function addLog(tag, tagClass, message) {
      const logs = $('logs');
      const time = new Date().toLocaleTimeString('fr-FR');
      const line = document.createElement('div');
      line.className = 'log-line';
      line.innerHTML = `
        <span class="log-time">${time}</span>
        <span class="log-tag ${tagClass}">${tag}</span>
        <span class="log-msg">${message}</span>
      `;
      logs.appendChild(line);
      logs.scrollTop = logs.scrollHeight;
      // Keep last 30 lines
      while (logs.children.length > 30) logs.removeChild(logs.firstChild);
    }

    async function fetchStatus() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();

        $('hostname').textContent = data.hostname;
        $('platform').textContent = data.platform;
        $('uptime').textContent = formatUptime(data.uptime);
        $('cpus').textContent = data.cpus;
        $('node-version').textContent = data.nodeVersion;

        const used = data.memory.total - data.memory.free;
        const pct = Math.round((used / data.memory.total) * 100);
        $('mem-used').textContent = used;
        $('mem-detail').textContent = `${used} / ${data.memory.total} MB (${pct}%)`;
        $('mem-bar').style.width = pct + '%';

        $('status-text').textContent = 'Online — ' + data.hostname;

        addLog('OK', 'ok', `Status fetched — uptime ${formatUptime(data.uptime)}`);

        if (pct > 80) {
          addLog('WARN', 'warn', `Memory usage high: ${pct}%`);
        }

      } catch (err) {
        $('status-text').textContent = 'Connection error';
        addLog('ERR', 'warn', 'Failed to reach /api/status');
      }
    }

    // Initial fetch
    addLog('INFO', 'info', 'Dashboard initialized');
    addLog('INFO', 'info', 'Connecting to server API...');
    fetchStatus();

    // Refresh every 5s
    setInterval(fetchStatus, 5000);

    // Simulated deployment log on load
    setTimeout(() => addLog('INFO', 'info', 'Service: mds-dashboard.service active'), 2000);
    setTimeout(() => addLog('OK', 'ok', 'DNS resolution: projetmds.fr → OK'), 3500);
  </script>
</body>
</html>
